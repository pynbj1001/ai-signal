name: Generate Daily Feed

on:
  schedule:
    - cron: '0 22 * * *'  # UTC 22:00 = Beijing 06:00
  workflow_dispatch:
    inputs:
      force_refresh:
        description: 'Ignore stored feed state for a one-off from-zero test'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Reset feed state for manual test
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.force_refresh == 'true' }}
        run: echo '{"seen_tweets":{},"seen_episodes":{},"seen_papers":{}}' > feeds/state-feed.json

      - name: Generate feeds
        env:
          TWITTER_COOKIES: ${{ secrets.TWITTER_COOKIES }}
        run: python scripts/generate_feed.py

      - name: Generate central summaries
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ARK_API_KEY: ${{ secrets.ARK_API_KEY }}
        run: |
          if [ -n "$ARK_API_KEY" ]; then
            python scripts/generate_summaries.py --profile zh_standard --type x --max-workers 6
            python scripts/generate_summaries.py --profile zh_standard --type papers --limit 12
          else
            echo "ARK_API_KEY is not set; skipping Doubao X and paper summaries."
          fi
          if [ -n "$DEEPSEEK_API_KEY" ]; then
            python scripts/generate_summaries.py --profile zh_short --profile zh_standard --profile zh_deep --type podcasts --limit 5
          else
            echo "DEEPSEEK_API_KEY is not set; skipping podcast summaries."
          fi

      - name: Commit feeds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feeds/feed-x.json feeds/feed-podcasts.json feeds/feed-arxiv.json feeds/state-feed.json -f
          [ -f feeds/feed-summaries.json ] && git add feeds/feed-summaries.json -f
          [ -d content/summaries ] && git add content/summaries -f
          git diff --staged --quiet || git commit -m "Feed update $(date -u +%Y-%m-%d)"
          git push
